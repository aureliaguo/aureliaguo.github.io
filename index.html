<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #000;
      color: #fff;
      max-width: 680px;
      margin: 80px auto;
      padding: 0 20px;
      line-height: 1.75;
    }

    nav {
      margin-bottom: 50px;
      font-size: 14px;
    }

    nav a {
      margin-right: 18px;
      text-decoration: none;
      color: #fff;
      opacity: 0.8;
    }

    nav a:hover {
      opacity: 1;
    }

    h1 {
      font-weight: normal;
      font-size: 28px;
      margin-bottom: 20px;
    }

    img {
      width: 100%;
      max-width: 320px;
      margin: 20px 0 40px 0;
      display: block;
    }

    .section {
      margin-top: 60px;
    }

    a {
      color: #fff;
      text-decoration: underline;
    }

    .item {
      margin-bottom: 12px;
    }

    .label {
      opacity: 0.6;
      font-size: 13px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<nav>
  <a href="/">about</a>
  <a href="#projects">projects</a>
  <a href="#book">book</a>
</nav>

<h1>Your Name</h1>

<p>
  Short intro about yourself. Keep it minimal and intentional.
</p>

<!-- PHOTO -->
<div class="section">
  <div class="label">photo</div>
  <img src="https://via.placeholder.com/600x400" alt="your photo">
</div>

<!-- BOOK -->
<div class="section" id="book">
  <div class="label">book</div>
  <div class="item">
    <a href="https://example.com" target="_blank">
      Title of Book You Like or Recommend →
    </a>
  </div>
</div>

<!-- PROJECTS -->
<div class="section" id="projects">
  <div class="label">projects</div>

  <div class="item">
    <a href="https://example.com" target="_blank">
      Project One →
    </a>
  </div>

  <div class="item">
    <a href="https://example.com" target="_blank">
      Project Two →
    </a>
  </div>

  <div class="item">
    <a href="https://example.com" target="_blank">
      Project Three →
    </a>
  </div>
</div>

</body>
</html>
